name: Deploy Blog to Aliyun & Server

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: crpi-lumqbuk51q86bxk3.cn-chengdu.personal.cr.aliyuncs.com/lonelyhorse/mylinux
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 【新增】设置 Docker Buildx，确保能正确构建并推送镜像
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Aliyun Container Registry
      uses: docker/login-action@v2
      with:
        registry: crpi-lumqbuk51q86bxk3.cn-chengdu.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PWD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 【修改】除了 latest 标签，额外增加一个基于当前 commit 编号的唯一标签 (github.sha)
        # 这样能 100% 保证每次推送到阿里云的镜像都是全新的，避开缓存
        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: SSH Remote Deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        # 【新增】把密码也传进 ssh-action 的环境变量里，供 script 使用
        envs: ALIYUN_REGISTRY_USER,ALIYUN_REGISTRY_PWD
        script: |
          # 【新增】服务器必须先登录阿里云镜像库！否则拉取私有镜像会失败，导致只能用老镜像
          docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PWD }} crpi-lumqbuk51q86bxk3.cn-chengdu.personal.cr.aliyuncs.com
          
          cd /home/user1/git_push/My_blog
          
          # 【修改】拉取最新镜像
          docker compose pull My_blog
          
          # 重建服务
          docker compose up -d --no-deps --force-recreate My_blog
          
          # 清理旧镜像
          docker image prune -f
          echo "🚀 Deployment Successful!"
