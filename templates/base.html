<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}lonelyhorse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- 导航栏 -->
    <header>
        <div class="container nav-flex">
            <a href="/" class="logo">lonelyhorse.</a>
            <nav class="nav-links">
                <a href="/">首页</a>
		<a href="/projects">项目库</a>
		<a href="/article/confession">自白</a>
                <a href="#">技术</a>
                <a href="/notes">随笔</a>

    <!-- 内容区域 -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 底部 -->
    <footer>
        <div class="container">
            <p style="opacity: 0.7; font-size: 0.9rem;">&copy; 2025 lonelyhorse. Code and Solitude.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</html>
