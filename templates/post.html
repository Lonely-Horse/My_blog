{% extends 'base.html' %}

{% block title %}{{ title }} - lonelyhorse{% endblock %}

{% block content %}
    <article class="article-container reveal">
        <header class="article-header">
            <h1 class="article-title">{{ title }}</h1>
            <div class="article-meta">Words and Reflections &middot; LONELY HORSE</div>
        </header>

        <div class="article-body">
            <!-- 插入不可见的空段落，用来消耗掉全局 CSS 中的 p:first-of-type 首字母大写样式 -->
            <p style="display: none;"></p>
            
            <!-- 遍历 TXT 的每一行，跳过空行，优化段落排版细节 -->
            {% for line in lines %}
                {% if line.strip() %}
                    <p class="reveal">{{ line }}</p>
                {% endif %}
            {% endfor %}
        </div>
        
        <div class="reveal" style="margin-top: 80px; text-align: center; margin-bottom: 40px;">
            <a href="/" class="btn-outline">← RETURN HOME</a>
        </div>
    </article>
{% endblock %}
